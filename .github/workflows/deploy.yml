name: Deploy to GCP

on:
  push:
    branches: [main]
    paths:
      - 'mudlib/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.GCP_HOST }}        # secrets → vars
          username: ${{ vars.GCP_USER }}    # secrets → vars
          key: ${{ vars.GCP_SSH_KEY }}      # secrets → vars
          script: |
            cd ${{ vars.MUD_PATH }}         # secrets → vars
            git pull origin main
